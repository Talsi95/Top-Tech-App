version: '3.8'

services:
  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app:cached
      - node_modules_frontend:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  backend:
    build: ./backend
    command: npm run dev
    volumes:
      - ./backend:/app:cached
      - node_modules_backend:/app/node_modules
      - ./frontend/dist:/app/dist:ro
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    dns:
      - 8.8.8.8
      - 8.8.4.4

  nginx:
    image: nginx:1.21-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  node_modules_frontend:
  node_modules_backend:
  redis_data:
